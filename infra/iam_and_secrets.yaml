AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM roles (least-privilege, one per Lambda) and Secrets Manager secrets
  for the Kling AI Video POC pipeline.
  Requirements: 9.1, 9.2, 9.3, 9.7

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  AwsRegion:
    Type: String
    Description: AWS region where the pipeline is deployed (e.g. us-east-1)
    Default: us-east-1

  AwsAccountId:
    Type: String
    Description: AWS account ID (12-digit number)
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: Must be a 12-digit AWS account ID

  JobsTableName:
    Type: String
    Description: DynamoDB table name for property-video-jobs
    Default: property-video-jobs

  ImagesTableName:
    Type: String
    Description: DynamoDB table name for property-video-images
    Default: property-video-images

  StoriesTableName:
    Type: String
    Description: DynamoDB table name for property-video-stories
    Default: property-video-stories

  EventBusBusName:
    Type: String
    Description: Name of the custom EventBridge event bus
    Default: realestate-video-pipeline

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # Secrets Manager Secrets
  # =========================================================================

  ElevenLabsApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: elevenlabs/api_key
      Description: ElevenLabs TTS API credentials (api_key and voice_id)
      SecretString: '{"api_key": "REPLACE_ME", "voice_id": "REPLACE_ME"}'
      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  ElevenLabsRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref ElevenLabsApiKeySecret
      RotationRules:
        AutomaticallyAfterDays: 90

  KlingApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: kling/api_key
      Description: Kling.ai video generation API key
      SecretString: '{"api_key": "REPLACE_ME"}'
      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  KlingApiKeyRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref KlingApiKeySecret
      RotationRules:
        AutomaticallyAfterDays: 90

  KlingWebhookSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: kling/webhook_secret
      Description: HMAC secret for validating Kling.ai webhook signatures
      SecretString: '{"webhook_secret": "REPLACE_ME"}'
      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  KlingWebhookSecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref KlingWebhookSecretSecret
      RotationRules:
        AutomaticallyAfterDays: 90

  # =========================================================================
  # IAM Role: ImageAnalysisFunction
  # =========================================================================

  ImageAnalysisFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-image-analysis-role-${AwsRegion}"
      Description: Least-privilege role for the ImageAnalysisFunction Lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: S3ReadInputImages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "arn:aws:s3:::realestate-video-input/*"

        - PolicyName: BedrockInvokeClaudeSonnet
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AwsRegion}::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0"

        - PolicyName: DynamoDBJobsAndImages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${JobsTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${ImagesTableName}"

        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AwsRegion}:${AwsAccountId}:event-bus/${EventBusBusName}"

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  # =========================================================================
  # IAM Role: StorySequencingFunction
  # =========================================================================

  StorySequencingFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-story-sequencing-role-${AwsRegion}"
      Description: Least-privilege role for the StorySequencingFunction Lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: DynamoDBJobsImagesStories
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${JobsTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${ImagesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${ImagesTableName}/index/*"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}/index/*"

        - PolicyName: BedrockInvokeClaudeSonnet
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AwsRegion}::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0"

        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AwsRegion}:${AwsAccountId}:event-bus/${EventBusBusName}"

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  # =========================================================================
  # IAM Role: VoiceoverGenerationFunction
  # =========================================================================

  VoiceoverGenerationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-voiceover-generation-role-${AwsRegion}"
      Description: Least-privilege role for the VoiceoverGenerationFunction Lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: DynamoDBJobsAndStories
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${JobsTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}/index/*"

        - PolicyName: S3WriteAssetsVoiceover
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: "arn:aws:s3:::realestate-video-assets/*"

        - PolicyName: SecretsManagerElevenLabs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref ElevenLabsApiKeySecret

        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AwsRegion}:${AwsAccountId}:event-bus/${EventBusBusName}"

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  # =========================================================================
  # IAM Role: VideoGenerationOrchestratorFunction
  # =========================================================================

  VideoGenerationOrchestratorFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-video-orchestrator-role-${AwsRegion}"
      Description: Least-privilege role for the VideoGenerationOrchestratorFunction Lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: DynamoDBJobsAndStories
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${JobsTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}/index/*"

        - PolicyName: S3GetInputForPresignedUrls
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "arn:aws:s3:::realestate-video-input/*"

        - PolicyName: SecretsManagerKlingApiKey
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref KlingApiKeySecret

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  # =========================================================================
  # IAM Role: KlingWebhookHandlerFunction
  # =========================================================================

  KlingWebhookHandlerFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-webhook-handler-role-${AwsRegion}"
      Description: Least-privilege role for the KlingWebhookHandlerFunction Lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: DynamoDBStoriesReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}/index/*"

        - PolicyName: S3WriteAssetsSegments
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: "arn:aws:s3:::realestate-video-assets/*"

        - PolicyName: SecretsManagerKlingWebhookSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref KlingWebhookSecretSecret

        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AwsRegion}:${AwsAccountId}:event-bus/${EventBusBusName}"

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

  # =========================================================================
  # IAM Role: AssemblyFunction (shared by all 3 assembly Lambdas)
  # =========================================================================

  AssemblyFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "kling-poc-assembly-role-${AwsRegion}"
      Description: Least-privilege role shared by all three assembly Lambda functions
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

        - PolicyName: DynamoDBJobsAndStories
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${JobsTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}"
                  - !Sub "arn:aws:dynamodb:${AwsRegion}:${AwsAccountId}:table/${StoriesTableName}/index/*"

        - PolicyName: S3ReadAssetsSegments
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: "arn:aws:s3:::realestate-video-assets/*"

        - PolicyName: S3WriteOutputVideo
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: "arn:aws:s3:::realestate-video-output/*"

      Tags:
        - Key: Project
          Value: kling-ai-video-poc
        - Key: ManagedBy
          Value: CloudFormation

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  # --- Role ARNs ---

  ImageAnalysisFunctionRoleArn:
    Description: ARN of the IAM role for ImageAnalysisFunction
    Value: !GetAtt ImageAnalysisFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ImageAnalysisFunctionRoleArn"

  StorySequencingFunctionRoleArn:
    Description: ARN of the IAM role for StorySequencingFunction
    Value: !GetAtt StorySequencingFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-StorySequencingFunctionRoleArn"

  VoiceoverGenerationFunctionRoleArn:
    Description: ARN of the IAM role for VoiceoverGenerationFunction
    Value: !GetAtt VoiceoverGenerationFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-VoiceoverGenerationFunctionRoleArn"

  VideoGenerationOrchestratorFunctionRoleArn:
    Description: ARN of the IAM role for VideoGenerationOrchestratorFunction
    Value: !GetAtt VideoGenerationOrchestratorFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-VideoGenerationOrchestratorFunctionRoleArn"

  KlingWebhookHandlerFunctionRoleArn:
    Description: ARN of the IAM role for KlingWebhookHandlerFunction
    Value: !GetAtt KlingWebhookHandlerFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KlingWebhookHandlerFunctionRoleArn"

  AssemblyFunctionRoleArn:
    Description: ARN of the shared IAM role for all assembly Lambda functions
    Value: !GetAtt AssemblyFunctionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AssemblyFunctionRoleArn"

  # --- Secret ARNs ---

  ElevenLabsApiKeySecretArn:
    Description: ARN of the ElevenLabs API key secret in Secrets Manager
    Value: !Ref ElevenLabsApiKeySecret
    Export:
      Name: !Sub "${AWS::StackName}-ElevenLabsApiKeySecretArn"

  KlingApiKeySecretArn:
    Description: ARN of the Kling.ai API key secret in Secrets Manager
    Value: !Ref KlingApiKeySecret
    Export:
      Name: !Sub "${AWS::StackName}-KlingApiKeySecretArn"

  KlingWebhookSecretArn:
    Description: ARN of the Kling.ai webhook HMAC secret in Secrets Manager
    Value: !Ref KlingWebhookSecretSecret
    Export:
      Name: !Sub "${AWS::StackName}-KlingWebhookSecretArn"
